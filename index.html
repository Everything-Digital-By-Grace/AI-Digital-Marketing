<script>
  // Random Joke Generator JS
  async function fetchJoke() {
    document.getElementById('joke-loading').style.display = '';
    document.getElementById('joke-content').style.display = 'none';
    try {
      const res = await fetch('https://official-joke-api.appspot.com/random_joke');
      const data = await res.json();
      document.getElementById('joke-content').innerHTML =
        `<div class="joke-setup">${data.setup}</div>
         <div class="joke-punch">${data.punchline}</div>`;
    } catch (err) {
      document.getElementById('joke-content').innerHTML = `<div style="color:#c8502a">Oops! Couldn't fetch a joke. Please try again.</div>`;
    }
    document.getElementById('joke-loading').style.display = 'none';
    document.getElementById('joke-content').style.display = '';
  }
</script>
